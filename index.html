<!-- index.html - Main entry point that assembles all components -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timothy John Lumangcas | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Component -->
    <div id="nav-placeholder"></div>

    <!-- Main Content Body -->
    <div id="body-placeholder"></div>

    <!-- Footer Component -->
    <div id="footer-placeholder"></div>

    <!-- JavaScript for loading components and interactivity -->
    <script src="script.js"></script>
    <script>
        // Load HTML components
        fetch('nav.html')
            .then(response => response.text())
            .then(data => document.getElementById('nav-placeholder').innerHTML = data);
        
        fetch('body.html')
            .then(response => response.text())
            .then(data => document.getElementById('body-placeholder').innerHTML = data);
        
        fetch('footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>
</html>
